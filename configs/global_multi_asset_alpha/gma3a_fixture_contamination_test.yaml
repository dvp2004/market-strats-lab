  core_strategy_id: "gma_balanced_core_v0"
  tactical_slots: 3
  core_allocation: 0.50
  tactical_allocation: 0.50
  allow_core_only: true

manual_tradingview:
  account_name: "TradingView Paper Trading - GMA Alpha V0"
  packet_prefix: "gma3a"
  preview_only: true
  broker_submission_allowed: false
  real_money_allowed: false
