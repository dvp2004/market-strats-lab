capital:
  starting_paper_capital: 100000.0
  account_starting_capital: 100000.0

calendar:
  signal_time_utc: "22:00:00"
  execution_policy: "next_valid_session_open"
  same_close_execution_allowed: false

costs:
  bps_per_notional: 1.0

limits:
  maximum_single_asset_weight: 0.35
  maximum_bitcoin_weight: 0.05
  maximum_tactical_allocation: 0.50
  minimum_trade_notional: 1.0
  portfolio_tolerance: 0.01
  target_weight_tolerance: 0.000001

selection_gates:
  require_no_lookahead_failure: true
  require_no_accounting_failure: true
  require_positive_common_period_net_return: true
  acceptable_maximum_drawdown: -0.35
  maximum_annualised_turnover: 4.0
  maximum_annualised_cost_drag: 0.01
  core_fallback_maximum_drawdown: -0.35
  core_fallback_maximum_annualised_turnover: 4.0
  core_fallback_maximum_annualised_cost_drag: 0.01
  require_positive_or_defensible_holdout: true
  require_no_single_favourable_period_dependency: true
  require_parameter_neighbour_stability: true

strategy_universe:
  allowed_symbols:
    - SPY
    - QQQ
    - IWM
    - EFA
    - EEM
    - SHY
    - IEF
    - TLT
    - AGG
    - LQD
    - HYG
    - GLD
    - DBC
    - VNQ
    - UUP
    - BTC-USD
    - CASH
  benchmark_symbol: SPY
  balanced_benchmark_weights:
    SPY: 0.35
    QQQ: 0.20
    IEF: 0.20
    GLD: 0.10
    DBC: 0.05
    CASH: 0.10

live_paper_ensemble:
