track:
  track_id: gma_alpha
  phase_id: gma1b_macro_cash_foundation
  paper_only: true
  live_trading_allowed: false
  real_money_allowed: false
  broker_api_integration_allowed: false

provider:
  primary_provider: fred
  vintage_provider: alfred
  api_key_environment_variable: FRED_API_KEY
  timeout_seconds: 20
  retry_count: 2
  immutable_snapshots: true
  prohibit_unofficial_fallback: true

point_in_time:
  require_realtime_periods: true
  require_availability_timestamp: true
  conservative_missing_release_time_policy: end_of_release_date_utc
  future_revision_policy: prohibit_future_revisions
  unknown_publication_time_policy: release_date_available_after_235959_utc
  asof_query_policy: latest_available_vintage_at_or_before_query_timestamp

cash:
  authoritative_series: DGS3MO
  source_yield_convention: percent_annualized_investment_yield
  annualisation_day_count: actual_365
  accrual_calendar: calendar_day
  weekend_accrual_policy: accrue_across_non_publication_days_using_latest_available_rate
  publication_lag_policy: rate_available_after_release_date_end_utc
  missing_rate_policy: fail_closed
  negative_rate_policy: allow_and_accrue
  bil_role: tradable_etf_proxy_and_cross_check_only

quality:
  required_series:
    - cash_3m_treasury
    - treasury_2y
    - treasury_10y
    - treasury_30y
    - curve_10y_2y
    - curve_10y_3m
    - breakeven_10y
    - real_yield_10y
    - vix
    - high_yield_oas
    - financial_stress
    - cpi
    - unemployment
    - industrial_production
  optional_series: []
  maximum_staleness_days: 7
  maximum_missing_interior_observations: 0
  require_series_metadata: true
  require_vintage_integrity: true
  require_hash_validation: true
  revision_materiality_tolerance: 0.000001

paths:
  raw_root: data/global_multi_asset_alpha/macro_raw
  manifest_root: data/global_multi_asset_alpha/macro_manifests
  canonical_root: data/global_multi_asset_alpha/canonical_macro
  report_root: reports/global_multi_asset_alpha/macro_foundation
  state_root: state/global_multi_asset_alpha

series:
  - macro_id: cash_3m_treasury
    provider: fred
    series_id: DGS3MO
    display_name: 3-month Treasury/cash rate
    economic_role: authoritative_cash_rate
    frequency: daily
    units: percent
    seasonal_adjustment: not_seasonally_adjusted
    native_observation_calendar: federal_reserve_business_day
    expected_publication_frequency: daily
    is_required: true
    is_vintage_aware: true
    revision_prone: false
    availability_timestamp_policy: release_date_available_after_235959_utc
    maximum_staleness_days: 7
    transformation_policy: percent_to_decimal_yield
    notes: Authoritative cash accrual source; BIL is not authoritative cash.
  - macro_id: treasury_2y
    provider: fred
    series_id: DGS2
    display_name: 2-year Treasury yield
    economic_role: rates_level
    frequency: daily
    units: percent
    seasonal_adjustment: not_seasonally_adjusted
    native_observation_calendar: federal_reserve_business_day
    expected_publication_frequency: daily
    is_required: true
