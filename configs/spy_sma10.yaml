phase11b_regime_scoring_architecture_spec:
  enabled: false

  spec_role: "Regime scoring architecture spec only"
  phase_branch: "Phase 11 architecture review"
  proposed_next_phase: "Phase 11C"

  source_architecture_decision:
    source_phase: "Phase 11A"
    selected_architecture: "A2_regime_scoring_layer"
    rejected_immediate_architecture: "A1_continue_simple_rule_overlays"
    rationale: "Technical and macro diagnostics were informative, but both failed as pre-registered simple rule overlays."

  allow_score_calculation: false
  allow_score_weights: false
  allow_signal_creation: false
  allow_allocation_rule_creation: false
  allow_strategy_backtest: false
  allow_model_training: false
  allow_new_data_ingestion: false
  allow_candidate_promotion: false

  scoring_principles:
    - principle_id: "diagnostic_before_trading"
      principle: "A regime score must be diagnostic before it can ever influence allocation."
      required: true
    - principle_id: "continuous_not_binary_first"
      principle: "The score architecture should avoid immediate hard if/then switches."
      required: true
    - principle_id: "evidence_family_separation"
      principle: "Technical, macro, future fundamental, future sentiment, validation-risk, and liveability evidence must remain separately auditable."
      required: true
    - principle_id: "no_post_hoc_weighting"
      principle: "Weights, thresholds, and score cutoffs must not be chosen after seeing performance."
      required: true
    - principle_id: "benchmark_first_validation"
      principle: "Any future score must be judged against the existing final candidate, SPY Buy & Hold, and SPY 12M Momentum."
      required: true
    - principle_id: "promotion_requires_later_validation"
      principle: "Even a successful future score test cannot immediately replace the final candidate."
      required: true

  component_families:
    - component_id: "technical_regime_context"
      family: "technical"
      role: "diagnostic_candidate"
      source_evidence: "Phase 9A/9B found useful technical clusters, but Phase 9D failed as a pre-registered technical-rule test."
      allowed_conceptual_inputs:
        - "trend"
