    architecture_decision_report: "reports/phase13ae_pivot_decision_architecture_decision_report.csv"
    failure_attribution_report: "reports/phase13ac_failure_attribution_failure_attribution_report.csv"
    dataset: "reports/phase13q_ml_feature_dataset_v1.csv"

  target_variant_registry:
    - target_variant_id: "original_63d_return_state"
      rule_type: "existing_state_column"
      description: "Reuse existing registered 63D SPY return-state target for baseline comparison."
      required_columns: ["future_63d_spy_return_state"]
      source_column: "future_63d_spy_return_state"
      horizon_days: 63
      enabled: true

    - target_variant_id: "return_63d_fragile_looser"
      rule_type: "return_63d_threshold"
      description: "Looser fragile return threshold to test whether class balance improves."
      required_columns: ["future_return_63d"]
      horizon_days: 63
      fragile_return_max: -0.03
      supportive_return_min: 0.05
      enabled: true

    - target_variant_id: "return_drawdown_63d_composite"
      rule_type: "return_drawdown_63d_composite"
      description: "Composite fragile state using forward return and forward drawdown."
      required_columns: ["future_return_63d", "future_window_max_drawdown_63d"]
      horizon_days: 63
      fragile_return_max: -0.04
      fragile_drawdown_max: -0.10
      supportive_return_min: 0.05
      supportive_drawdown_min: -0.08
      enabled: true

    - target_variant_id: "drawdown_63d_fragile"
      rule_type: "drawdown_63d_threshold"
      description: "Drawdown-first fragile target to test whether adverse-risk labels are more learnable."
      required_columns: ["future_return_63d", "future_window_max_drawdown_63d"]
      horizon_days: 63
      fragile_drawdown_max: -0.10
      supportive_return_min: 0.04
      supportive_drawdown_min: -0.05
      enabled: true

    - target_variant_id: "return_21d_future_candidate"
      rule_type: "unavailable_future_horizon"
      description: "Registry-only 21D target candidate; blocked until 21D outcome columns exist."
      required_columns: ["future_return_21d", "future_window_max_drawdown_21d"]
      horizon_days: 21
      enabled: true

    - target_variant_id: "return_126d_future_candidate"
      rule_type: "unavailable_future_horizon"
      description: "Registry-only 126D target candidate; blocked until 126D outcome columns exist."
      required_columns: ["future_return_126d", "future_window_max_drawdown_126d"]
      horizon_days: 126
      enabled: true

  target_quality_policy:
    allowed_classes: ["supportive", "neutral", "fragile", "unavailable"]
    required_live_classes: ["supportive", "neutral", "fragile"]
    min_validation_fragile_ratio: 0.12
    max_validation_fragile_ratio: 0.35
    min_train_fragile_ratio: 0.12
    max_train_fragile_ratio: 0.35
    require_fragile_mean_return_below_neutral: true
    require_fragile_drawdown_worse_than_neutral: true
    require_supportive_mean_return_above_neutral: true
    no_target_variant_promotion: true
    no_model_training_from_panel: true

  feature_family_registry:
    - family_id: "technical"
      status: "available_current_dataset"
      value_prefixes: ["value__technical_"]
      state_prefixes: ["state__technical_"]
      missingness_prefixes: ["missingness__technical_"]

    - family_id: "macro"
      status: "available_current_dataset"
      value_prefixes: ["value__macro_"]
      state_prefixes: ["state__macro_"]
      missingness_prefixes: ["missingness__macro_"]

    - family_id: "fundamental"
      status: "future_missing"
      value_prefixes: ["value__fundamental_"]
      state_prefixes: ["state__fundamental_"]
      missingness_prefixes: ["missingness__fundamental_"]

    - family_id: "sentiment"
      status: "future_missing"
      value_prefixes: ["value__sentiment_"]
      state_prefixes: ["state__sentiment_"]
      missingness_prefixes: ["missingness__sentiment_"]

    - family_id: "market_stress"
