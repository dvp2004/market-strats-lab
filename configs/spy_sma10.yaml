      family: "technical"
      eligibility: "eligible_for_future_score_calculation"
      source_basis: "Phase 9 diagnostics and Phase 11 diagnostic panel content"
      allowed_states: ["supportive", "neutral", "fragile"]
      may_affect_future_score: true
      may_create_signal_now: false

    - component_id: "macro_regime_context"
      family: "macro_rates_inflation"
      eligibility: "eligible_for_future_score_calculation"
      source_basis: "Phase 10 diagnostics and Phase 11 diagnostic panel content"
      allowed_states: ["supportive", "neutral", "fragile"]
      may_affect_future_score: true
      may_create_signal_now: false

    - component_id: "validation_risk_context"
      family: "validation_risk"
      eligibility: "eligible_for_future_score_calculation_as_control_penalty"
      source_basis: "Phase 8/9/10/11 validation-risk evidence"
      allowed_states: ["supportive", "neutral", "fragile"]
      may_affect_future_score: true
      may_create_signal_now: false

