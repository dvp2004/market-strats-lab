    phase13b_paper_trading_readiness_plan: "reports/phase13b_roadmap_paper_trading_readiness_plan.csv"

  feature_source_inventory:
    - family_id: "technical"
      family_status: "source_contract_feasible"
      candidate_sources: ["existing OHLCV market data", "SPY adjusted close", "S&P 500 proxy series", "derived price/volume indicators"]
      feature_examples: ["trend", "momentum", "volatility", "drawdown", "breadth proxy"]
      timing_frequency: "daily"
      point_in_time_requirement: "market data available after close; signals must use lagged data only"
      revision_risk: "low"
      leakage_risk: "medium"
      immediate_decision: "eligible_for_contract_design"
      blocked_now: false

    - family_id: "macro"
      family_status: "source_contract_feasible_with_existing_phase10_foundation"
      candidate_sources: ["FRED/ALFRED-style macro series", "Treasury yield curve", "CPI/inflation series", "unemployment series"]
      feature_examples: ["rates regime", "inflation regime", "labour regime", "yield-curve regime"]
      timing_frequency: "monthly/daily mixed"
      point_in_time_requirement: "release-date lagging and vintage/revision policy required"
      revision_risk: "high"
      leakage_risk: "high"
      immediate_decision: "eligible_for_contract_design_with_strict_lagging"
      blocked_now: false

    - family_id: "fundamental"
      family_status: "requires_source_audit_before_use"
      candidate_sources: ["index-level valuation data", "earnings yield", "profit margins", "quality/profitability proxies", "ETF/provider fundamentals"]
      feature_examples: ["valuation", "earnings growth", "profitability", "quality", "margin trend"]
      timing_frequency: "monthly/quarterly"
      point_in_time_requirement: "publication date and reporting lag required before use"
      revision_risk: "medium"
      leakage_risk: "high"
      immediate_decision: "blocked_until_dedicated_fundamental_source_audit"
      blocked_now: true

    - family_id: "sentiment"
      family_status: "requires_source_audit_before_use"
      candidate_sources: ["news sentiment", "risk appetite proxy", "VIX/proxy sentiment", "positioning/crowding proxy", "narrative indicators"]
      feature_examples: ["risk appetite", "news tone", "crowding", "narrative pressure", "volatility fear proxy"]
      timing_frequency: "daily/weekly mixed"
      point_in_time_requirement: "timestamped source availability and noise-control policy required"
      revision_risk: "medium"
      leakage_risk: "very_high"
      immediate_decision: "blocked_until_dedicated_sentiment_source_audit"
      blocked_now: true

    - family_id: "dissertation_integration"
      family_status: "methodology_only"
      candidate_sources: ["no direct market data source"]
      feature_examples: ["optimisation constraints", "decision-support dashboard", "validation governance"]
      timing_frequency: "not_applicable"
      point_in_time_requirement: "methodology only; no alpha feature unless separately justified"
      revision_risk: "not_applicable"
      leakage_risk: "conceptual_overfit_risk"
      immediate_decision: "allowed_as_methodology_not_feature"
      blocked_now: false

  feature_contract_requirements:
    - requirement_id: "FC1_source_identity"
      requirement: "Every feature must name its raw source and source file/API before ingestion."
      required: true
    - requirement_id: "FC2_timestamp_policy"
      requirement: "Every feature must define observation date, release date, availability date, and trading decision date."
      required: true
    - requirement_id: "FC3_lag_policy"
      requirement: "Every feature must specify conservative lagging before model use."
      required: true
    - requirement_id: "FC4_revision_policy"
      requirement: "Every revisable series must define vintage/revision treatment."
      required: true
    - requirement_id: "FC5_missingness_policy"
      requirement: "Every feature must define missingness, stale-value, and unavailable-state handling."
      required: true
    - requirement_id: "FC6_transform_policy"
      requirement: "Every feature transform must be pre-registered before calculation."
      required: true
    - requirement_id: "FC7_no_return_selection"
      requirement: "Feature selection cannot use future returns or post-hoc performance ranking."
      required: true
    - requirement_id: "FC8_audit_output"
      requirement: "Every feature family must produce inventory, leakage, coverage, and contract reports."
      required: true

  leakage_control_policy:
    - control_id: "LC1_no_same_day_macro"
      control: "Macro/fundamental/sentiment data cannot be used on the observation date unless availability is timestamp-proven."
      required: true
    - control_id: "LC2_no_vintage_blind_macro"
      control: "Revised macro series require conservative lagging or vintage-aware source handling."
      required: true
    - control_id: "LC3_no_future_index_membership"
      control: "Index/member fundamentals cannot use future membership information."
      required: true
    - control_id: "LC4_no_posthoc_feature_selection"
      control: "Feature inclusion cannot be decided from observed backtest performance without pre-registration."
      required: true
    - control_id: "LC5_no_signal_before_contract"
      control: "No signal can be created until feature contracts and readiness audits pass."
      required: true
    - control_id: "LC6_no_model_before_data_audit"
      control: "No model training before feature-source availability and leakage audits pass."
      required: true

  blocked_family_policy:
    fundamental_blocked_until: "Dedicated fundamental source/leakage audit passes."
    sentiment_blocked_until: "Dedicated sentiment source/leakage/noise audit passes."
    dissertation_direct_alpha_blocked_until: "Market-data mapping and alpha rationale are separately justified."
    blocked_families_may_appear_in_roadmap: true
    blocked_families_may_be_ingested_now: false
    blocked_families_may_be_used_in_model_now: false

