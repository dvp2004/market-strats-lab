    overfit_diagnostic_report: "reports/phase13w_interpretation_overfit_diagnostic_report.csv"
    class_recall_report: "reports/phase13w_interpretation_class_recall_report.csv"
    baseline_comparison_report: "reports/phase13w_interpretation_dummy_comparison_report.csv"
    dataset: "reports/phase13q_ml_feature_dataset_v1.csv"

  repair_targets:
    - target_id: "fragile_class_recall"
      problem: "diagnostic leading model had 0.0 fragile-class validation recall"
      required_direction: "increase fragile-class recall without destroying validation balanced accuracy"
    - target_id: "overfit_control"
      problem: "all real models triggered overfit warnings"
      required_direction: "reduce train-validation metric gap"
    - target_id: "baseline_edge_preservation"
      problem: "Random Forest edge exists but is not robust enough for holdout"
      required_direction: "preserve material edge versus dummy baselines"

  registered_repair_hypotheses:
    - repair_id: "rf_repair_shallow_regularised"
      base_model_family: "random_forest"
      hypothesis: "shallower trees and larger leaves may reduce overfit while preserving validation edge"
      allowed: true
      max_depth: 2
      min_samples_leaf: 50
      n_estimators: 300
    - repair_id: "rf_repair_fragile_weighted"
      base_model_family: "random_forest"
      hypothesis: "fragile-class weighting may improve fragile recall"
      allowed: true
      max_depth: 3
      min_samples_leaf: 30
      n_estimators: 300
      class_weight:
        supportive: 1.0
        neutral: 1.0
        fragile: 3.0
    - repair_id: "logistic_repair_high_regularisation"
      base_model_family: "logistic_regression"
      hypothesis: "stronger regularisation may reduce linear-model overfit"
      allowed: true
      C: 0.25
      max_iter: 1000
    - repair_id: "histgb_repair_shallow_l2"
      base_model_family: "hist_gradient_boosting"
      hypothesis: "shallow boosted trees with L2 regularisation may reduce severe overfit"
      allowed: true
      max_iter: 80
      learning_rate: 0.03
      max_leaf_nodes: 7
      l2_regularization: 1.0

  repair_success_gates:
    min_validation_fragile_recall: 0.20
    min_delta_balanced_accuracy_vs_majority: 0.05
    min_delta_macro_f1_vs_majority: 0.05
    max_balanced_accuracy_overfit_gap: 0.30
    max_macro_f1_overfit_gap: 0.30
    require_no_holdout_predictions: true
    require_no_feature_importance: true
    require_no_signal: true
    require_no_backtest: true

  phase13z_boundary:
    allowed_next_step: "ML diagnostic repair readiness and boundary audit only"
    forbidden_next_step: "repair execution, holdout prediction generation, model selection, feature importance, signal creation, allocation rule, strategy backtest, paper-trading deployment, candidate promotion, or final-candidate change"

  phase13aa_boundary:
