      family: "fundamental_valuation"
      blocked_reason: "No source/leakage feasibility audit exists."
      unblock_requires: "Separate fundamental/valuation source and leakage audit."
      may_affect_future_score: false

    - component_id: "future_sentiment_context"
      family: "sentiment_narrative"
      blocked_reason: "No source/leakage feasibility audit exists."
      unblock_requires: "Separate sentiment/narrative source and leakage audit."
      may_affect_future_score: false

  formula_structure:
    formula_id: "pre_registered_three_component_regime_score"
    formula_role: "future diagnostic score formula grammar only"
    aggregation_policy: "non_return_based_equal_component_vote_with_validation_risk_control"
    allowed_component_states: ["supportive", "neutral", "fragile"]
    score_state_output: ["supportive", "neutral", "fragile"]
    numeric_score_values_defined: false
    empirical_weights_allowed: false
    returns_used_for_formula_design: false
    description: "Future Phase 12C may map the three eligible component states into a diagnostic supportive/neutral/fragile regime score without using returns to choose weights or cutoffs."

  weighting_policy:
    policy_id: "non_return_equal_component_policy"
    policy_type: "pre_registered_non_return_based_policy"
    eligible_component_scope: "technical_macro_validation_risk_only"
    empirical_return_weighting_allowed: false
    optimisation_allowed: false
    cutoff_search_allowed: false
    numeric_weights_assigned_now: false
    pre_registration_required_before_calculation: true

  missingness_policy:
    policy_id: "explicit_missingness_caution_policy"
    no_return_inference: true
    no_silent_fill: true
    unavailable_component_action: "mark_unavailable"
    blocked_component_action: "exclude_and_flag_blocked"
    validation_risk_missing_action: "default_to_caution"
    score_calculation_allowed_with_missing_validation_risk: false

  score_state_interpretation:
    - state: "supportive"
      interpretation: "Diagnostic context appears supportive for the existing final candidate."
      trading_allowed: false
      signal_allowed: false
    - state: "neutral"
      interpretation: "Diagnostic context is mixed, unavailable, or insufficient."
      trading_allowed: false
      signal_allowed: false
    - state: "fragile"
      interpretation: "Diagnostic context suggests elevated vulnerability for the existing final candidate."
      trading_allowed: false
      signal_allowed: false

  future_validation_gates:
    - gate_id: "score_content_source_gate"
      gate: "Future score calculation may only use existing Phase 11 diagnostic panel content unless a new source audit exists."
      required: true
    - gate_id: "no_return_weighting_gate"
      gate: "Future score calculation must not use returns to choose weights or cutoffs."
      required: true
    - gate_id: "component_audit_gate"
      gate: "Each component contribution must remain separately auditable."
      required: true
    - gate_id: "missingness_gate"
      gate: "Missingness and blocked-family handling must be explicit."
      required: true
    - gate_id: "diagnostic_before_strategy_gate"
      gate: "Future score must be evaluated diagnostically before any strategy test."
      required: true
    - gate_id: "promotion_block_gate"
      gate: "A future score cannot promote a candidate without later validation."
      required: true

  failure_conditions:
    - condition_id: "returns_used_for_weights"
      condition: "Fail if historical returns are used to choose score weights or cutoffs."
    - condition_id: "blocked_family_used"
      condition: "Fail if fundamental or sentiment components are used before source/leakage audits."
    - condition_id: "signal_created"
